name: Auto Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get diff
        id: get_diff
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          DIFF=$(git diff origin/${{ github.base_ref }} --unified=0)
          echo "DIFF<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Run review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DIFF: ${{ steps.get_diff.outputs.DIFF }}
        run: node scripts/review.js

      - name: Read review.json
        id: parse
        run: |
          echo "JSON=$(cat review.json)" >> $GITHUB_OUTPUT

      - name: Post summary comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            ## 🤖 Auto Code Review
            **Summary:**  
            ${{ fromJson(steps.parse.outputs.JSON).summary }}

            Found issues: **${{ fromJson(steps.parse.outputs.JSON).issues.length }}**
      - name: Post inline comments
        uses: peter-evans/create-or-update-review@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.pull_request.number }}
          event: COMMENT
          comments: |
            ${{ steps.parse.outputs.JSON }}
